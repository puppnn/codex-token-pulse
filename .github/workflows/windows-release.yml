name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without the v prefix"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "${{ inputs.version }}"
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install build tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pillow
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: .\build-windows.ps1 -Version $env:VERSION -Python python

      - uses: actions/upload-artifact@v4
        with:
          name: CodexTokenPulse-Setup-v${{ env.VERSION }}
          path: release/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          if (gh release view $tag --repo $repo 2>$null) {
            gh release upload $tag release/* --repo $repo --clobber
          } else {
            gh release create $tag release/* `
              --repo $repo `
              --title "Codex Token Pulse $tag" `
              --generate-notes
          }
